<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFix Kampüs | Yönetici Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 27, 75, 0.5); /* Deep Indigo */
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark);
            background-image: radial-gradient(circle at top left, rgba(99, 102, 241, 0.1), transparent 40%),
                              radial-gradient(circle at bottom right, rgba(239, 68, 68, 0.05), transparent 40%);
            margin: 0; 
            padding: 30px; 
            color: var(--text-main); 
            min-height: 100vh;
        }

        .header-container { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 30px; border-radius: 16px; margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border-color);
        }
        .header-container h1 { margin: 0; color: #818cf8; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; text-shadow: 0 0 20px rgba(129, 140, 248, 0.3); }
        
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); color: white; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .btn-primary:hover { box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6); transform: translateY(-1px); }
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); margin-left: 10px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        .btn-danger:hover { box-shadow: 0 8px 25px rgba(239, 68, 68, 0.6); transform: translateY(-1px); }
        .btn-danger:active { transform: scale(0.98); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 25px; border-radius: 16px; text-align: center; 
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1); }
        .stat-card h3 { margin: 0; color: var(--text-muted); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .stat-card .value { font-size: 42px; font-weight: 700; margin-top: 10px; font-family: 'Inter', sans-serif; }
        
        .text-blue { color: #818cf8; text-shadow: 0 0 20px rgba(129, 140, 248, 0.4); }
        .text-red { color: #fca5a5; text-shadow: 0 0 20px rgba(248, 113, 113, 0.4); }
        .text-yellow { color: #fcd34d; text-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }

        /* Radar Dot Animation */
        .radar-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; position: relative; }
        .radar-dot::after {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%; border: 2px solid inherit; opacity: 0;
            animation: radar 2s ease-out infinite;
        }
        .dot-blue { background-color: #818cf8; } .dot-blue::after { border-color: #818cf8; }
        .dot-red { background-color: #fca5a5; } .dot-red::after { border-color: #fca5a5; }
        .dot-yellow { background-color: #fcd34d; } .dot-yellow::after { border-color: #fcd34d; }

        @keyframes radar {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .table-container { 
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; padding: 25px; overflow-x: auto; 
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border-color);
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }
        th, td { padding: 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { font-weight: 600; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { font-size: 14px; }
        tr { transition: background-color 0.2s ease; }
        tr:hover { background-color: rgba(99, 102, 241, 0.05); }
        tr:last-child td { border-bottom: none; }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite linear;
            border-radius: 6px;
            height: 20px;
            width: 100%;
        }
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .badge { 
            padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; 
            display: inline-block; text-align: center; min-width: 90px;
            letter-spacing: 0.5px;
        }

        /* Neon Rozetler & Pulse Aura */
        .badge-critical { 
            background: rgba(239, 68, 68, 0.1); color: #fca5a5; 
            border: 1px solid rgba(239, 68, 68, 0.5); 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2), inset 0 0 10px rgba(239, 68, 68, 0.1); 
            animation: pulseBadge 2s infinite;
        }
        .badge-warning { 
            background: rgba(245, 158, 11, 0.1); color: #fcd34d; 
            border: 1px solid rgba(245, 158, 11, 0.4); 
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.15); 
        }
        .badge-low { 
            background: rgba(16, 185, 129, 0.1); color: #6ee7b7; 
            border: 1px solid rgba(16, 185, 129, 0.4); 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.15); 
        }

        @keyframes pulseBadge {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4), inset 0 0 10px rgba(239, 68, 68, 0.1); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0), inset 0 0 10px rgba(239, 68, 68, 0.1); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0), inset 0 0 10px rgba(239, 68, 68, 0.1); }
        }

        .durum-text { font-weight: 700; padding: 4px 8px; border-radius: 4px; display: inline-block; font-size: 13px; }
        .durum-bekliyor { color: #fcd34d; background: rgba(245, 158, 11, 0.1); }
        .durum-islemde { color: #818cf8; background: rgba(99, 102, 241, 0.1); }
        .durum-cozuldu { color: #6ee7b7; background: rgba(16, 185, 129, 0.1); }

        .photo-link { cursor: pointer; color: #818cf8; font-weight: 500; background: rgba(99, 102, 241, 0.1); padding: 6px 12px; border-radius: 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid rgba(99, 102, 241, 0.2); transition: var(--transition); }
        .photo-link:hover { background: rgba(99, 102, 241, 0.2); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); transform: translateY(-1px); }
        
        .email-field { color: #a5b4fc; font-weight: 500; font-family: monospace; font-size: 14px; background: rgba(165, 180, 252, 0.1); padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(165, 180, 252, 0.15); }
        
        .loading-text { text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500; font-size: 15px; letter-spacing: 1px; }

        /* Action Buttons */
        .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-action { padding: 6px 10px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition); color: white; display: inline-flex; align-items: center; justify-content: center; }
        .btn-process { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
        .btn-process:hover { background: rgba(99, 102, 241, 0.4); transform: translateY(-1px); }
        .btn-resolve { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-resolve:hover { background: rgba(16, 185, 129, 0.4); transform: translateY(-1px); }
        .btn-delete { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.4); transform: translateY(-1px); box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); color: white; }
        .btn-action:active { transform: scale(0.95); }

        /* Modal (Glassmorphic) */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.show { display: flex; opacity: 1; }
        .modal-content {
            position: relative; max-width: 80%; max-height: 80%; border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            background: var(--card-bg); padding: 15px; border: 1px solid var(--border-color);
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal.show .modal-content { transform: scale(1); }
        .modal-content img { max-width: 100%; max-height: 70vh; border-radius: 10px; display: block; object-fit: contain; }
        .close-modal {
            position: absolute; top: -15px; right: -15px; width: 36px; height: 36px;
            background: var(--bg-dark); color: white; border-radius: 50%; font-size: 24px;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); border: 2px solid var(--border-color);
            transition: var(--transition);
        }
        .close-modal:hover { transform: scale(1.1) rotate(90deg); background: var(--danger); border-color: var(--danger); }
    </style>
</head>
<body>

<div class="header-container">
    <h1>📡 SmartFix Yönetim Radarı</h1>
    <div>
        <button class="btn btn-primary" onclick="verileriCek()">Yenile 🔄</button>
        <button class="btn btn-danger" onclick="cikisYap()">Çıkış Yap 🚪</button>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h3><span class="radar-dot dot-blue"></span> Toplam Sistem Kaydı</h3>
        <div class="value text-blue" id="totalIssues">0</div>
    </div>
    <div class="stat-card">
        <h3><span class="radar-dot dot-red"></span> Acil Müdahale (Skor 8-10)</h3>
        <div class="value text-red" id="criticalIssues">0</div>
    </div>
    <div class="stat-card">
        <h3><span class="radar-dot dot-yellow"></span> Bekleyen Görevler</h3>
        <div class="value text-yellow" id="pendingIssues">0</div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th style="width: 15%;">Arıza Başlığı</th>
            <th style="width: 20%;">Detay / Açıklama</th>
            <th>Gönderen</th>
            <th>📸 Dosya</th>
            <th>Bildirim Zamanı</th>
            <th>🤖 AI Skor</th>
            <th>Durum</th>
            <th style="text-align: right;">Aksiyonlar</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        <tr>
            <td><div class="skeleton"></div></td>
            <td><div class="skeleton"></div></td>
            <td><div class="skeleton"></div></td>
            <td><div class="skeleton"></div></td>
            <td><div class="skeleton"></div></td>
            <td><div class="skeleton"></div></td>
            <td><div class="skeleton"></div></td>
            <td><div class="skeleton"></div></td>
            <td><div class="skeleton"></div></td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Modal Structure -->
<div id="imageModal" class="modal" onclick="kapatModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="document.getElementById('imageModal').classList.remove('show'); setTimeout(() => document.getElementById('imageModal').style.display='none', 300);">&times;</span>
        <img id="modalImage" src="" alt="Arıza Fotoğrafı">
    </div>
</div>

<script>
    window.onload = verileriCek;

    async function verileriCek() {
        const tableBody = document.getElementById('tableBody');

        try {
            const response = await fetch('http://localhost:8080/api/issues/liste');
            const data = await response.json();

            document.getElementById('totalIssues').innerText = data.length;
            document.getElementById('pendingIssues').innerText = data.filter(i => i.durum === 'Bekliyor').length;
            document.getElementById('criticalIssues').innerText = data.filter(i => i.aiAciliyetSkoru >= 8).length;

            tableBody.innerHTML = '';

            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9" class="loading-text">Sistemde henüz bir arıza kaydı bulunmuyor.</td></tr>';
                return;
            }

            data.sort((a, b) => b.aiAciliyetSkoru - a.aiAciliyetSkoru).forEach(ariza => {
                let badgeClass = '';
                let badgeText = '';

                if (ariza.aiAciliyetSkoru >= 8) {
                    badgeClass = 'badge-critical';
                    badgeText = '🚨 KRİTİK (' + ariza.aiAciliyetSkoru + ')';
                } else if (ariza.aiAciliyetSkoru >= 5) {
                    badgeClass = 'badge-warning';
                    badgeText = '⚠️ ORTA (' + ariza.aiAciliyetSkoru + ')';
                } else {
                    badgeClass = 'badge-low';
                    badgeText = '✅ DÜŞÜK (' + ariza.aiAciliyetSkoru + ')';
                }

                let durumClass = 'durum-bekliyor';
                if (ariza.durum === 'İşleme Alındı') durumClass = 'durum-islemde';
                else if (ariza.durum === 'Çözüldü') durumClass = 'durum-cozuldu';

                let fotoGosterim = ariza.fotografUrl && ariza.fotografUrl !== "Fotoğraf Yok" && ariza.fotografUrl !== ""
                    ? `<span class="photo-link" onclick="fotoGoster('${ariza.fotografUrl}')">📸 Görüntüle</span>`
                    : `<span style="color: #64748b; font-size: 13px; font-style: italic;">Yok</span>`;

                let tarih = "Bilinmiyor";
                if(ariza.bildirimTarihi) {
                    const dateObj = new Date(ariza.bildirimTarihi);
                    tarih = dateObj.toLocaleDateString('tr-TR') + "<br><span style='color: #818cf8; font-size: 12px;'>" + dateObj.toLocaleTimeString('tr-TR') + "</span>";
                }

                let emailGosterim = ariza.ogrenciEmail && ariza.ogrenciEmail !== "Bilinmiyor"
                    ? `<span class="email-field" style="font-size: 12px;">${ariza.ogrenciEmail}</span>`
                    : `<span style="color: #64748b; font-size: 12px; font-style: italic;">Anonim</span>`;

                const row = `
                    <tr>
                        <td style="color: #94a3b8; font-weight: bold; font-family: monospace; font-size: 14px;">#${ariza.id}</td>
                        <td style="font-weight: 600; color: #f1f5f9; font-size: 13px;">${ariza.baslik}</td>
                        <td style="color: #cbd5e1; font-size: 13px; line-height: 1.5;">${ariza.aciklama}</td>
                        <td>${emailGosterim}</td>
                        <td>${fotoGosterim}</td>
                        <td style="font-size: 13px; color: #94a3b8;">${tarih}</td>
                        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                        <td><span class="durum-text ${durumClass}">${ariza.durum || 'Bekliyor'}</span></td>
                        <td style="text-align: right;">
                            <div class="action-buttons" style="justify-content: flex-end;">
                                <button class="btn-action btn-process" title="İşleme Al" onclick="durumGuncelle(${ariza.id}, 'İşleme Alındı')">⚙️ İşleme Al</button>
                                <button class="btn-action btn-resolve" title="Çözüldü Olarak İşaretle" onclick="durumGuncelle(${ariza.id}, 'Çözüldü')">✅ Çözüldü</button>
                                <button class="btn-action btn-delete" title="Sil" onclick="arizaSil(${ariza.id}, this)">🗑️ Sil</button>
                            </div>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

        } catch (error) {
            console.error('Veri çekme hatası:', error);
            tableBody.innerHTML = '<tr><td colspan="9" class="loading-text" style="color: #fca5a5; background: rgba(239, 68, 68, 0.05);">Ağ Bağlantısı Koptu! Backend (Java) çalışıyor mu?</td></tr>';
        }
    }

    async function arizaSil(id, btnElement) {
        if (!confirm("Bu arızayı kalıcı olarak silmek istediğinize emin misiniz?")) return;
        
        try {
            const response = await fetch('http://localhost:8080/api/issues/' + id, { method: 'DELETE' });
            if (response.ok) {
                // SADECE backend'den gelen yanıt başarılıysa DOM'dan satırı sil
                const row = btnElement.closest('tr');
                if(row) {
                    row.style.transition = "all 0.4s ease";
                    row.style.opacity = "0";
                    row.style.transform = "translateX(-20px)";
                    setTimeout(() => {
                        row.remove();
                        // DOM'dan silindikten sonra istatistikleri tazelemek için sessizce arka planda verileriCek diyebiliriz
                        // ya da sadece DOM'u silmek yeterlidir. Biz arka planı sessizce tazeleyelim:
                        verileriCek(); 
                    }, 400);
                }
            } else {
                alert("Silme işlemi sırasında hata oluştu!");
            }
        } catch (err) {
            alert("Sunucuyla iletişim kurulamadı!");
        }
    }

    async function durumGuncelle(id, yeniDurum) {
        try {
            const response = await fetch('http://localhost:8080/api/issues/' + id + '/durum', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ durum: yeniDurum })
            });
            if (response.ok) {
                verileriCek(); // Tabloyu anında yenile
            } else {
                alert("Durum güncellenirken hata oluştu!");
            }
        } catch (err) {
            alert("Sunucuyla iletişim kurulamadı!");
        }
    }

    function fotoGoster(url) {
        const modal = document.getElementById('imageModal');
        const img = document.getElementById('modalImage');
        // Backend tam static dosya yolu üzerinden eşleştirme
        img.src = 'http://localhost:8080/uploads/' + url;
        modal.style.display = 'flex';
        // Animasyon tetiklemesi için mini gecikme
        setTimeout(() => modal.classList.add('show'), 10);
    }

    function kapatModal(event) {
        const modal = document.getElementById('imageModal');
        if(event.target === modal) {
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }
    }

    function cikisYap() {
        window.location.href = '/';
    }
</script>
</body>
</html>
